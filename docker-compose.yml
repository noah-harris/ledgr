services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "${EXTERNAL_PORT}:${INTERNAL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" -b -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  init-db:
    image: noahharriscontact/db-deployer-initializer:latest
    healthcheck:
      test: ["CMD-SHELL", "grep -q '\"status\": \"ready\"' /app/sql-scripts/status.json"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: ${HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EXTERNAL_PORT: ${EXTERNAL_PORT}
      INTERNAL_PORT: ${INTERNAL_PORT}
      DIALECT: ${DIALECT}
      RESTORE_POINT_INTERVAL_MINUTES: ${RESTORE_POINT_INTERVAL_MINUTES}
      RESTORE_POINT_RETENTION: ${RESTORE_POINT_RETENTION}
      
      IMAGE_DIRECTORY: ${IMAGE_DIRECTORY}

      BUDGET_TOOL_USERNAME: ${BUDGET_TOOL_USERNAME}
      BUDGET_TOOL_PASSWORD: ${BUDGET_TOOL_PASSWORD}
      BUDGET_TOOL_HOST: ${BUDGET_TOOL_HOST}
      BUDGET_TOOL_PORT: ${BUDGET_TOOL_PORT}


    volumes:
      - restore:/app/restore
      - sql-scripts:/app/sql-scripts

volumes:
  restore:
    driver: local
    driver_opts:
      type: ${TYPE}
      device: "${RESTORE_POINT_DIRECTORY}"
      o:  ${O}

  sql-scripts:
    driver: local
    driver_opts:
      type: ${TYPE}
      device: "${SQL_PROJECT_DIRECTORY}"
      o: ${O}