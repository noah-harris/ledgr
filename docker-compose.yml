services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DOCKER_DB_PASSWORD}"
    ports:
      - "${DOCKER_DB_EXTERNAL_PORT}:${DOCKER_DB_INTERNAL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" -b -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      DOCKER_DB_USERNAME: ${DOCKER_DB_USERNAME}
      DOCKER_DB_PASSWORD: ${DOCKER_DB_PASSWORD}
      DOCKER_DB_IP: ${DOCKER_DB_IP}
      DOCKER_DB_INTERNAL_PORT: ${DOCKER_DB_INTERNAL_PORT}
      DOCKER_DB_EXTERNAL_PORT: ${DOCKER_DB_EXTERNAL_PORT}

    volumes:
      - db-restore:/app/data

volumes:
  db-restore: